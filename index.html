<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đếm Ngược</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>⏳ Đếm ngược đến <span id="target-date-text">31/12/2025</span></h1>
      <div class="countdown">
        <div>
          <span id="days">0</span>
          <p>Ngày</p>
        </div>
        <div>
          <span id="hours">0</span>
          <p>Giờ</p>
        </div>
        <div>
          <span id="minutes">0</span>
          <p>Phút</p>
        </div>
        <div>
          <span id="seconds">0</span>
          <p>Giây</p>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
